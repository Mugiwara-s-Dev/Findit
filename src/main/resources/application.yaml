spring:
  application:
    name: FindIt
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/findit}
    username: ${DB_USERNAME:findit}
    password: ${DB_PASSWORD:findit123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
server:
  port: 8080

findit:
  auth:
    jwt-secret: ${JWT_SECRET:findit-local-secret-key-change-me-2026}
    jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:180}
    frontend-callback-url: ${FRONTEND_AUTH_CALLBACK_URL:http://localhost:3000/auth/callback}
  search:
    default-radius-km: 5.0
  integrations:
    open-food-facts:
      base-url: ${OPEN_FOOD_FACTS_BASE_URL:https://world.openfoodfacts.org}
      user-agent: ${OPEN_FOOD_FACTS_USER_AGENT:FindIt/0.1 (https://findit.local; support@findit.local)}
  cors:
    allowed-origin: ${FRONTEND_URL:http://localhost:3000}
