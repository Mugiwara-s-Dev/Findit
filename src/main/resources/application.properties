spring.application.name=FindIt

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/findit}
spring.datasource.username=${DB_USERNAME:findit}
spring.datasource.password=${DB_PASSWORD:findit123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.sql.init.mode=never

server.port=9090

findit.auth.jwt-secret=${JWT_SECRET:findit-local-secret-key-change-me-2026}
findit.auth.jwt-expiration-minutes=${JWT_EXPIRATION_MINUTES:180}

findit.search.default-radius-km=5.0

findit.integrations.open-food-facts.base-url=${OPEN_FOOD_FACTS_BASE_URL:https://world.openfoodfacts.org}
findit.integrations.open-food-facts.user-agent=${OPEN_FOOD_FACTS_USER_AGENT:FindIt/0.1 (https://findit.local; support@findit.local)}

findit.cors.allowed-origin=${FRONTEND_URL:http://0.0.0.0:8080}
